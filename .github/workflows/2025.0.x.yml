name: 2025.0.x
on:
  push:
    branches: [ main, xuxiaowei/* ]
    paths:
      - '.github/workflows/2025.0.x.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/2025.0.x.yml'
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        spring-cloud-version: [ 2025.0.0, 2025.0.1, 2025.0.2, 2025.0.3 ]
        spring-cloud-build-version: [ 4.3.0, 4.3.1, 4.3.2, 4.3.3, 4.3.4 ]
        spring-boot-version: [
          3.5.0,
          # 3.5.1,
          3.5.2,
          # 3.5.3,
          3.5.4,
          # 3.5.5,
          3.5.6,
          # 3.5.7,
          3.5.8,
          3.5.9,
          3.5.10,
          3.5.11,
          3.5.12,
          3.5.13,
          3.5.14,
          3.5.15 ]
    env:
      BRANCH: 2025.0.x
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Dependencies Cache
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Clone alibaba/spring-cloud-alibaba ${{ env.BRANCH }}
        run: git clone --branch ${{ env.BRANCH }} --depth 1 https://github.com/alibaba/spring-cloud-alibaba
      - name: Print Maven version
        working-directory: spring-cloud-alibaba
        run: ./mvnw -version
      - name: Set spring-cloud-build version
        working-directory: spring-cloud-alibaba
        run: |
          sed -i "s#<version>4.3.0</version>#<version>${{ matrix.spring-cloud-build-version }}</version>#" pom.xml
          sed -i "s#<version>4.3.0</version>#<version>${{ matrix.spring-cloud-build-version }}</version>#" spring-cloud-alibaba-dependencies/pom.xml
      - name: Compile
        working-directory: spring-cloud-alibaba
        run: ./mvnw clean -B -T 1C compile -Pfast -Dspring-boot.version=${{ matrix.spring-boot-version }} -Dspring.cloud.version=${{ matrix.spring-cloud-version }}
      - name: install dependencies
        working-directory: spring-cloud-alibaba
        run: ./mvnw -B -T 1C install -U package -pl '!spring-cloud-alibaba-coverage' -DskipTests -Dspring-boot.version=${{ matrix.spring-boot-version }} -Dspring.cloud.version=${{ matrix.spring-cloud-version }}
      - name: Testing
        working-directory: spring-cloud-alibaba
        run: ./mvnw verify -B -T 1C -Dmaven.test.skip=false -Dspring-boot.version=${{ matrix.spring-boot-version }} -Dspring.cloud.version=${{ matrix.spring-cloud-version }}
      - name: Delete snapshots from the Maven local repository
        run: find ~/.m2/repository -type d -name '*-SNAPSHOT' -print -exec rm -r {} +
