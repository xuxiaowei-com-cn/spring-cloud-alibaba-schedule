name: 2025.1.x
on:
  push:
    branches: [ main, xuxiaowei/* ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
    env:
      BRANCH: 2025.1.x
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'adopt'
      - name: Dependencies Cache
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Clone alibaba/spring-cloud-alibaba ${{ env.BRANCH }}
        run: git clone --branch ${{ env.BRANCH }} --depth 1 https://github.com/alibaba/spring-cloud-alibaba
      - name: Print Maven version
        working-directory: spring-cloud-alibaba
        run: ./mvnw -version
      - name: Compile & Checkstyle
        working-directory: spring-cloud-alibaba
        run: ./mvnw clean -B -T 1C compile
      - name: install dependencies
        working-directory: spring-cloud-alibaba
        run: ./mvnw clean -B -T 1C install -U package -pl '!spring-cloud-alibaba-coverage'  -DskipTests
      - name: Testing
        working-directory: spring-cloud-alibaba
        run: ./mvnw verify -B -T 1C -Dmaven.test.skip=false
      - name: Delete snapshots from the Maven local repository
        run: find ~/.m2/repository -type d -name '*-SNAPSHOT' -print -exec rm -r {} +
